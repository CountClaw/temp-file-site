<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>临时文件站</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo"><span class="dot"></span><span>临时文件站</span></div>
      <div class="sub">A 方案：极简商务风</div>
    </div>

    <div class="hero">
      <h1>统一入口，快速访问文件</h1>
      <p>按分类查看文件，支持搜索、排序、复制链接与直接下载。界面保持简洁，重点信息优先呈现。</p>
      <div class="chips">
        <span class="chip">极简</span>
        <span class="chip">高可读</span>
        <span class="chip">移动端友好</span>
        <span class="chip">Git Push 即更新</span>
      </div>
      <div class="nav">
        <a href="pages/images.html">🖼 图片</a>
        <a href="pages/docs.html">📄 文档</a>
        <a href="pages/data.html">📊 数据</a>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="n" data-total>0</div><div class="k">文件总数</div></div>
      <div class="stat"><div class="n">3</div><div class="k">分类数量</div></div>
      <div class="stat"><div class="n">GitHub Pages</div><div class="k">托管方式</div></div>
      <div class="stat"><div class="n">Public</div><div class="k">访问权限</div></div>
    </div>

    <div class="section">分类入口</div>
    <div class="cats">
      <a class="cat" href="pages/images.html"><div class="name">🖼 图片区</div><div class="meta" data-count="images">-</div></a>
      <a class="cat" href="pages/docs.html"><div class="name">📄 文档区</div><div class="meta" data-count="docs">-</div></a>
      <a class="cat" href="pages/data.html"><div class="name">📊 数据区</div><div class="meta" data-count="data">-</div></a>
    </div>

    <div class="latest">
      <div><b>最近更新</b> <span class="muted">（最近 3 项）</span></div>
      <ul id="latest-list"></ul>
    </div>

    <div class="foot">提示：将文件放入 <code>files/</code> 后执行 <code>git push</code>，页面会自动同步更新。</div>
  </div>

  <button id="back-top" class="float-top">↑ 顶部</button>
  <script src="assets/app.js"></script>
</body>
</html>
