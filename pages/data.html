<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>数据列表</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body data-category="data">
  <div class="wrap">
    <div class="top">
      <div class="title" id="page-title">📊 数据列表</div>
      <a class="back" href="../index.html">← 返回首页</a>
    </div>

    <div class="nav">
      <a href="images.html">🖼 图片</a>
      <a href="docs.html">📄 文档</a>
      <a class="active" href="data.html">📊 数据</a>
    </div>

    <div class="toolbar">
      <input id="search-input" class="input" placeholder="搜索文件名 / 类型" />
      <select id="sort-select" class="select">
        <option value="latest">按时间（最新）</option>
        <option value="name">按名称</option>
        <option value="size">按大小</option>
      </select>
      <button id="clear-btn" class="btn ghost">清空搜索</button>
      <button id="copy-visible-btn" class="btn ghost">复制当前列表链接</button>
      <span id="count-text" class="count"></span>
    </div>

    <table class="table">
      <thead><tr><th>文件名</th><th>类型</th><th>大小</th><th>更新时间</th><th>操作</th></tr></thead>
      <tbody id="file-table-body"></tbody>
    </table>
    <div id="empty-state" class="empty">没有匹配结果，换个关键词试试。</div>
  </div>

  <button id="back-top" class="float-top">↑ 顶部</button>
  <script src="../assets/app.js"></script>
</body>
</html>
