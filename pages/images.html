<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文件列表</title>
<style>
:root{--bg:#f4fbf8;--panel:#ffffff;--line:#d9ece4;--text:#25403a;--muted:#6e8f86;--red:#3bb58f;--accent:#8adfc5}*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f6fcfa,#eef8f4);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:22px 18px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.back{color:#2a4f45;background:#e6f6f0;border:1px solid #c6e9dd;padding:7px 11px;border-radius:8px;text-decoration:none}.title{font-size:24px;font-weight:800}
.toolbar{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.input,.select{background:#fff;border:1px solid #cbe8de;color:#2d4f46;border-radius:9px;padding:8px 10px;font-size:13px}
.input{min-width:220px}.count{color:var(--muted);font-size:12px;margin-left:auto}
.table{width:100%;border-collapse:collapse;margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 8px 20px rgba(84,150,126,.08)}
th,td{padding:11px 12px;border-bottom:1px solid #e7f4ef;text-align:left}th{color:#4f7d71;background:#f6fcf9}.muted{color:var(--muted)}
.btn{display:inline-block;background:var(--red);color:#fff;padding:6px 10px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;margin-right:6px}.btn.ghost{background:#e6f5ef;color:#2a6253}
.empty{display:none;margin-top:10px;padding:10px 12px;border:1px dashed #b8e1d3;border-radius:10px;color:var(--muted);background:#f8fdfb}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.icard{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 6px 16px rgba(80,145,123,.08)}
.ithumb{aspect-ratio:4/3;background:#edf8f3;display:flex;align-items:center;justify-content:center;cursor:zoom-in}
.ithumb img{max-width:100%;max-height:100%;display:block}
.imeta{padding:8px 10px}.iname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.isub{font-size:12px;color:var(--muted);margin-top:4px}
.lightbox{position:fixed;inset:0;background:rgba(30,52,45,.45);backdrop-filter:blur(3px);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:min(92vw,1200px);max-height:78vh;border-radius:12px;box-shadow:0 20px 50px rgba(44,95,79,.25)}
.lb-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border:none;border-radius:999px;background:#e4f7f0;color:#2a5f51;font-size:24px;cursor:pointer}
.lb-name{margin-top:10px;color:#285346;font-size:13px;background:#eef9f4;padding:5px 10px;border-radius:999px}
</style></head><body data-category="images"><div class="wrap"><div class="top"><div class="title" id="page-title">🖼 图片列表</div><a class="back" href="../index.html">← 返回首页</a></div>
<div class="toolbar">
  <input id="search-input" class="input" placeholder="搜索文件名 / 类型" />
  <select id="sort-select" class="select">
    <option value="latest">按时间（最新）</option>
    <option value="name">按名称</option>
    <option value="size">按大小</option>
  </select>
  <button id="clear-btn" class="btn ghost">清空搜索</button>
  <button id="copy-visible-btn" class="btn ghost">复制当前列表链接</button>
  <button id="toggle-view-btn" class="btn ghost">切换为缩略图视图</button>
  <span id="count-text" class="count"></span>
</div>
<table class="table"><thead><tr><th>文件名</th><th>类型</th><th>大小</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="file-table-body"></tbody></table>
<div id="empty-state" class="empty">没有匹配结果，换个关键词试试。</div>
<div id="image-grid" class="grid" style="display:none;margin-top:12px"></div>

<div id="lightbox" class="lightbox" style="display:none">
  <button id="lb-close" class="lb-close">×</button>
  <img id="lb-img" src="" alt="preview" />
  <div id="lb-name" class="lb-name"></div>
</div>
</div><script src="../assets/app.js"></script></body></html>
