<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文件列表</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--line:#2a2f3a;--text:#f2f4f8;--muted:#9aa3b2;--red:#d33a31}*{box-sizing:border-box}
body{margin:0;background:#101318;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:22px 18px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.back{color:#fff;background:#232834;border:1px solid #333a47;padding:7px 11px;border-radius:8px;text-decoration:none}.title{font-size:24px;font-weight:800}
.toolbar{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.input,.select{background:#171c26;border:1px solid #364053;color:#e8ecf5;border-radius:9px;padding:8px 10px;font-size:13px}
.input{min-width:220px}.count{color:var(--muted);font-size:12px;margin-left:auto}
.table{width:100%;border-collapse:collapse;margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{padding:11px 12px;border-bottom:1px solid #303541;text-align:left}th{color:#cfd6e6}.muted{color:var(--muted)}
.btn{display:inline-block;background:var(--red);color:#fff;padding:6px 10px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;margin-right:6px}.btn.ghost{background:#2b313d}
.empty{display:none;margin-top:10px;padding:10px 12px;border:1px dashed #43495a;border-radius:10px;color:var(--muted)}
</style></head><body data-category="images"><div class="wrap"><div class="top"><div class="title" id="page-title">🖼 图片列表</div><a class="back" href="../index.html">← 返回首页</a></div>
<div class="toolbar">
  <input id="search-input" class="input" placeholder="搜索文件名 / 类型" />
  <select id="sort-select" class="select">
    <option value="latest">按时间（最新）</option>
    <option value="name">按名称</option>
    <option value="size">按大小</option>
  </select>
  <button id="clear-btn" class="btn ghost">清空搜索</button>
  <button id="copy-visible-btn" class="btn ghost">复制当前列表链接</button>
  <span id="count-text" class="count"></span>
</div>
<table class="table"><thead><tr><th>文件名</th><th>类型</th><th>大小</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="file-table-body"></tbody></table>
<div id="empty-state" class="empty">没有匹配结果，换个关键词试试。</div>
</div><script src="../assets/app.js"></script></body></html>
