<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>图片列表</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--line:#2a2f3a;--text:#f2f4f8;--muted:#9aa3b2;--red:#d33a31}*{box-sizing:border-box}
body{margin:0;background:#101318;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:1060px;margin:0 auto;padding:22px 18px}.top{display:flex;justify-content:space-between;align-items:center}
.back{color:#fff;background:#232834;border:1px solid #333a47;padding:7px 11px;border-radius:8px;text-decoration:none}.title{font-size:24px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}.thumb{aspect-ratio:16/10;background:#0d0f13;display:flex;align-items:center;justify-content:center}
.thumb img{max-width:100%;max-height:100%}.meta{padding:10px}.name{font-weight:700}.sub{font-size:12px;color:var(--muted);margin-top:4px}.btn{display:inline-block;margin-top:8px;background:var(--red);color:#fff;padding:7px 10px;border-radius:8px;text-decoration:none}
</style></head><body><div class="wrap"><div class="top"><div class="title">🖼 图片列表</div><a class="back" href="../index.html">← 返回首页</a></div>
<div class="grid">
<div class="card"><div class="thumb"><img src="../files/images/cat_1.jpg"></div><div class="meta"><div class="name">cat_1.jpg</div><div class="sub">image/jpeg</div><a class="btn" href="../files/images/cat_1.jpg" target="_blank">查看/下载</a></div></div>
<div class="card"><div class="thumb"><img src="../files/images/cat_2.jpg"></div><div class="meta"><div class="name">cat_2.jpg</div><div class="sub">image/jpeg</div><a class="btn" href="../files/images/cat_2.jpg" target="_blank">查看/下载</a></div></div>
<div class="card"><div class="thumb"><img src="../files/images/cat_3.jpg"></div><div class="meta"><div class="name">cat_3.jpg</div><div class="sub">image/jpeg</div><a class="btn" href="../files/images/cat_3.jpg" target="_blank">查看/下载</a></div></div>
</div></div></body></html>
